server {
    listen 80;
    server_name helpdesk.hcvdesk.eu;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name helpdesk.hcvdesk.eu;

    ssl_certificate     /etc/letsencrypt/live/helpdesk.hcvdesk.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/helpdesk.hcvdesk.eu/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
    }

    # Přílohy tiketů — přes Django (kontrola oprávnění)
    location /media/tickets/attachments/ {
        deny all;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }
}
