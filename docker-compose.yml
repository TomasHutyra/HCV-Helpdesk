version: '3.9'

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: hcv_helpdesk
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env.production
    environment:
      DATABASE_URL: postgres://helpdesk:${POSTGRES_PASSWORD:-changeme}@db:5432/hcv_helpdesk
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - media_data:/app/media
    expose:
      - "8000"

  worker:
    build: .
    restart: unless-stopped
    command: celery -A helpdesk worker -l info
    depends_on:
      - db
      - redis
    env_file: .env.production
    environment:
      DATABASE_URL: postgres://helpdesk:${POSTGRES_PASSWORD:-changeme}@db:5432/hcv_helpdesk
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - media_data:/app/media

  beat:
    build: .
    restart: unless-stopped
    command: celery -A helpdesk beat -l info
    depends_on:
      - db
      - redis
    env_file: .env.production
    environment:
      DATABASE_URL: postgres://helpdesk:${POSTGRES_PASSWORD:-changeme}@db:5432/hcv_helpdesk
      CELERY_BROKER_URL: redis://redis:6379/0

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - ./staticfiles:/app/staticfiles:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles: ["certbot"]

volumes:
  postgres_data:
  redis_data:
  media_data:
  certbot_data:
  certbot_www:
