{% load i18n %}
{% with s=ticket.status %}
<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium
  {% if s == 'new' %}bg-gray-100 text-gray-700
  {% elif s == 'offer_prep' %}bg-purple-100 text-purple-800
  {% elif s == 'in_progress' %}bg-blue-100 text-blue-800
  {% elif s == 'resolved' %}bg-green-100 text-green-800
  {% elif s == 'rejected' %}bg-red-100 text-red-800
  {% endif %}">
  {{ ticket.get_status_display }}
</span>
{% endwith %}
